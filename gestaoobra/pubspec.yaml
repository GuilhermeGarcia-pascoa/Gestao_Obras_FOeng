name: obras_app
description: Gestão de obras — horas, gastos e relatórios

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_secure_storage: ^9.2.4

  # HTTP e estado
  http: ^1.1.0
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  url_launcher: ^6.2.0

  # Ficheiros
  path_provider: ^2.1.0

  # Gráficos
  fl_chart: ^0.65.0

  # Calendário
  table_calendar: ^3.1.2

  # UI
  cupertino_icons: ^1.0.6
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/LogoApp.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/LogoApp.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/LogoApp.png
    - assets/images/logo.png