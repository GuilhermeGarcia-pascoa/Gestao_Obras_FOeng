name: obras_app
description: Gestão de obras — horas, gastos e relatórios

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP e estado
  http: ^1.1.0
  provider: ^6.1.1
  shared_preferences: ^2.2.2   # Guardar token JWT localmente

  # Gráficos
  fl_chart: ^0.65.0

  # Calendário
  table_calendar: ^3.1.2

  # UI
  cupertino_icons: ^1.0.6
  intl: ^0.19.0               # Formatação de datas e moeda

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
